{% load static %}
<aside :class="{ '!w-18': showDrawer }"
        x-data="sidebarComponent()"
        class="fixed z-20 h-screen transition-all duration-300 ease-in-out border-r dark:border-neutral-800 w-18 lg:w-60 border-neutral-200 lg:border-none">
    <nav class="relative z-10 h-full">
        <div id="logo" class="pt-5 pl-4.5 mb-3 w-max">
        <a href="">
            <div x-show="!darkMode" >
                <img class="hidden lg:block" :class="{ '!hidden': showDrawer }" src="{% static 'images/tikTok.png' %}" alt="" />
                <img class="block lg:hidden" :class="{ '!block': showDrawer }" src="{% static 'images/icon.png' %}" alt="" />
            </div>
            <div x-show="darkMode" x-cloak>
                <img class="hidden lg:block" :class="{ '!hidden': showDrawer }" src="{% static 'images/tiktok_dark.png' %}" alt="" />
                <img class="block lg:hidden" :class="{ '!block': showDrawer }" src="{% static 'images/icon_dark.png' %}" alt="" />
            </div>
        </a>
        </div>
        <div class="px-4">
        <button  @click="showDrawer = !showDrawer ; showSearch = true" id="search" class="flex items-center w-full h-10 rounded-full cursor-pointer bg-neutral-100 pl-2.5 dark:bg-neutral-800">
            <div class="flex-shrink-0 size-5">
            <svg viewBox="0 0 48 48">
                <path d="M21.83 7.5a14.34 14.34 0 1 1 0 28.68 14.34 14.34 0 0 1 0-28.68Zm0-4a18.33 18.33 0 1 0 11.48 32.64l8.9 8.9a1 1 0 0 0 1.42 0l1.4-1.41a1 1 0 0 0 0-1.42l-8.89-8.9A18.34 18.34 0 0 0 21.83 3.5Z"></path>
            </svg>
            </div>
            <span x-text="searchQuery ? searchQuery : 'Search' " 
                class="hidden ml-2 text-sm lg:block" 
                :class="{ '!hidden': showDrawer, 'text-neutral-400 dark:text-neutral-500' : !searchQuery }">
            </span>
        </button>

        <div id="navigation">
            {% include 'includes/navigation.html' %}
        </div>
        
        <div class="hidden py-4 border-t dark:border-neutral-800 !border-neutral-200 lg:block" :class="{ '!hidden' : showDrawer}">
            <p class="text-sm dark:text-neutral-500 !text-neutral-400 whitespace-nowrap">© 2026 TikTok</p>
        </div> 
        </div>
    </nav>

    <side-drawer @click.outside="showDrawer = false; resetAll()" x-show="showDrawer" x-cloak class="fixed top-0 h-full bg-white border-l border-r dark:border-neutral-800 dark:bg-black left-18 w-80 border-neural-200"
                    x-transition:enter="transition duration-300 ease-out"
                    x-transition:enter-start="-translate-x-full opacity-0"
                    x-transition:enter-end="transition-x-0 opacity-100"
                    x-transition:leave="transition duration-200 ease-in"
                    x-transition:leave-start="transition-x-0 opacity-100"
                    x-transition:leave-end="-translate-x-full opacity-0"
                    >
        <div x-show="showSearch" class="relative px-2 py-5">
        <button id="close-button" @click="showDrawer = false; resetAll()" class="absolute flex items-center justify-center rounded-full cursor-pointer dark:hover:bg-neutral-700 dark:bg-neutral-800 size-7 right-4 top-6 bg-neutral-100 hover:bg-neutral-200">
            <div class="size-4">
            <svg viewBox="0 0 48 48">
                <path d="M38.7 12.12a1 1 0 0 0 0-1.41l-1.4-1.42a1 1 0 0 0-1.42 0L24 21.17 12.12 9.3a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 0 0 0 1.41L21.17 24 9.3 35.88a1 1 0 0 0 0 1.41l1.42 1.42a1 1 0 0 0 1.41 0L24 26.83 35.88 38.7a1 1 0 0 0 1.41 0l1.42-1.42a1 1 0 0 0 0-1.41L26.83 24 38.7 12.12Z"></path>
            </svg>
            </div>
        </button>  
        
        {% include '_search/search.html' %}

        </div>

        <div x-show="showActivity" class="relative flex flex-col h-screen px-2 py-5">
            <button id="close-button" @click="showDrawer = false; resetAll()" class="absolute flex items-center justify-center rounded-full cursor-pointer dark:hover:bg-neutral-700 dark:bg-neutral-800 size-7 right-4 top-6 bg-neutral-100 hover:bg-neutral-200">
                <div class="size-4">
                <svg viewBox="0 0 48 48">
                    <path d="M38.7 12.12a1 1 0 0 0 0-1.41l-1.4-1.42a1 1 0 0 0-1.42 0L24 21.17 12.12 9.3a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 0 0 0 1.41L21.17 24 9.3 35.88a1 1 0 0 0 0 1.41l1.42 1.42a1 1 0 0 0 1.41 0L24 26.83 35.88 38.7a1 1 0 0 0 1.41 0l1.42-1.42a1 1 0 0 0 0-1.41L26.83 24 38.7 12.12Z"></path>
                </svg>
                </div>
            </button>  
        
            <h2 class="pl-3 mb-7">Notifications</h2>
            <div id="notification-content" class="flex-1 overflow-y-auto overscroll-contain hide-scrollbar"></div>

        </div>

        <div x-show="showMessages" class="relative flex flex-col h-screen px-2 py-5">
            <button id="close-button" @click="showDrawer = false; resetAll()" class="absolute flex items-center justify-center rounded-full cursor-pointer dark:hover:bg-neutral-700 dark:bg-neutral-800 size-7 right-4 top-6 bg-neutral-100 hover:bg-neutral-200">
                <div class="size-4">
                <svg viewBox="0 0 48 48">
                    <path d="M38.7 12.12a1 1 0 0 0 0-1.41l-1.4-1.42a1 1 0 0 0-1.42 0L24 21.17 12.12 9.3a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 0 0 0 1.41L21.17 24 9.3 35.88a1 1 0 0 0 0 1.41l1.42 1.42a1 1 0 0 0 1.41 0L24 26.83 35.88 38.7a1 1 0 0 0 1.41 0l1.42-1.42a1 1 0 0 0 0-1.41L26.83 24 38.7 12.12Z"></path>
                </svg>
                </div>
            </button>  
        
            <h2 class="pl-3 mb-7">Messages</h2>
            <div id="messages-content" class="flex-1 overflow-y-auto overscroll-contain hide-scrollbar"></div>

        </div>
        
        <div x-show="showMore" class="relative px-2 py-5">
        <button id="close-button" @click="showDrawer = false; resetAll()" class="absolute flex items-center justify-center rounded-full cursor-pointer dark:hover:bg-neutral-700 dark:bg-neutral-800 size-7 right-4 top-6 bg-neutral-100 hover:bg-neutral-200">
            <div class="size-4">
            <svg viewBox="0 0 48 48">
                <path d="M38.7 12.12a1 1 0 0 0 0-1.41l-1.4-1.42a1 1 0 0 0-1.42 0L24 21.17 12.12 9.3a1 1 0 0 0-1.41 0l-1.42 1.42a1 1 0 0 0 0 1.41L21.17 24 9.3 35.88a1 1 0 0 0 0 1.41l1.42 1.42a1 1 0 0 0 1.41 0L24 26.83 35.88 38.7a1 1 0 0 0 1.41 0l1.42-1.42a1 1 0 0 0 0-1.41L26.83 24 38.7 12.12Z"></path>
            </svg>
            </div>
        </button>  
        <h2 class="pl-2 mb-7">More</h2>
        <ul class="flex flex-col gap-1">
            <li>
            <button @click="resetAll(); showColorModes = true" class="button-rounded dark:hover:!bg-neutral-800">
                <span class="font-medium">Dark mode</span>
                <div class="size-4 fill-neutral-400">
                <svg viewBox="0 0 48 48">
                    <path d="M28.74 24 15.08 10.33a1 1 0 0 1 0-1.41l1.84-1.84a1 1 0 0 1 1.41 0L34.54 23.3a1 1 0 0 1 0 1.42l-16.2 16.21a1 1 0 0 1-1.42 0l-1.84-1.84a1 1 0 0 1 0-1.41L28.74 24Z"></path>
                </svg>
                </div>
            </button>
            </li>
            <li>
                <a href="{% url 'settings' %}" class="button-rounded dark:hover:!bg-neutral-800">
                    <span class="font-medium">Settings</span>
                </a>
            </li>
            <li>
                <form method="post" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="button-rounded dark:hover:!bg-neutral-800">
                        <span class="font-medium">log out</span>
                    </button>
                </form>
            </li>
        </ul>
        </div>
        <div x-show="showColorModes" class="relative px-2 py-5">
        <div class="flex items-center pl-2 mb-7">
            <button @click="resetAll(); showMore = true; " class="flex items-center justify-center rounded-full cursor-pointer dark:bg-neutral-800 dark:hover:bg-neutral-700 size-6 right-4 top-6 bg-neutral-100 hover:bg-neutral-200">
            <div class="size-4 fill-neutral-700 dark:fill-white">
                <svg viewBox="0 0 48 48">
                <path d="m19.26 24 13.66-13.67a1 1 0 0 0 0-1.41l-1.84-1.84a1 1 0 0 0-1.41 0L13.46 23.3a1 1 0 0 0 0 1.42l16.2 16.21a1 1 0 0 0 1.42 0l1.84-1.84a1 1 0 0 0 0-1.41L19.26 24Z"></path>
                </svg>
            </div>
            </button>
            <h2 class="pl-2">Dark mode</h2>
        </div>
        <ul class="flex flex-col gap-1">
            <li>
            <button @click="darkMode = true" 
                    hx-get="{% url 'settings' %}?darkmode=true"
                    hx-swap="none"
                    class="button-rounded dark:hover:!bg-neutral-800">
                <span class="font-medium">Dark mode</span>
                <div x-show="darkMode" class="size-3.5">
                <svg viewBox="0 0 48 48">
                    <path d="M43 6.08c.7.45 1.06.67 1.25.98.16.27.23.59.2.9-.03.36-.26.72-.7 1.43L23.06 42.14a3.5 3.5 0 0 1-5.63.39L4.89 27.62c-.54-.64-.81-.96-.9-1.32a1.5 1.5 0 0 1 .09-.92c.14-.33.46-.6 1.1-1.14l1.69-1.42c.64-.54.96-.81 1.31-.9.3-.06.63-.04.92.09.34.14.6.46 1.15 1.1l9.46 11.25 18.11-28.7c.45-.72.68-1.07.99-1.26.27-.16.59-.23.9-.2.36.03.71.25 1.43.7L43 6.08Z"></path>
                </svg>
                </div>
            </button>
            </li>
            <li>
            <button @click="darkMode = false" 
                    hx-get="{% url 'settings' %}?darkmode=false"
                    hx-swap="none"
                    class="button-rounded dark:hover:!bg-neutral-800">
                <span class="font-medium">Light mode</span>
                <div x-show="!darkMode" class="size-3.5">
                <svg viewBox="0 0 48 48">
                    <path d="M43 6.08c.7.45 1.06.67 1.25.98.16.27.23.59.2.9-.03.36-.26.72-.7 1.43L23.06 42.14a3.5 3.5 0 0 1-5.63.39L4.89 27.62c-.54-.64-.81-.96-.9-1.32a1.5 1.5 0 0 1 .09-.92c.14-.33.46-.6 1.1-1.14l1.69-1.42c.64-.54.96-.81 1.31-.9.3-.06.63-.04.92.09.34.14.6.46 1.15 1.1l9.46 11.25 18.11-28.7c.45-.72.68-1.07.99-1.26.27-.16.59-.23.9-.2.36.03.71.25 1.43.7L43 6.08Z"></path>
                </svg>
                </div>
            </button>
            </li>
        </ul>
        </div>
    </side-drawer>
</aside>

<script>
    function sidebarComponent(){
        return {
            showDrawer: false,
            searchQuery: '',
            showSearch: false,
            showMore: false,
            showActivity: false,
            showMessages: false,
            showColorModes: false,
            resetAll(){
                this.showMore = false,
                this.showActivity = false,
                this.showMessages = false,
                this.showSearch = false,
                this.showColorModes = false
            }
        }
    }
</script>
