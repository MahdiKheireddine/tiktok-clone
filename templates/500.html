{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something went wrong - TikTok</title>
  <link rel="shortcut icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}" />
  <link href="{% static 'css/style.css' %}" rel="stylesheet" />
</head>
<body class="bg-white dark:bg-black dark:text-white">
  <div class="flex items-center justify-center min-h-screen px-6">
    <div class="max-w-md text-center">
      <p class="text-8xl font-bold text-rose-500">500</p>
      <h1 class="mt-4 text-3xl font-bold">Something went wrong</h1>
      <p class="mt-3 text-neutral-500 dark:text-neutral-400">
        We're working to fix it. Please try again in a moment.
      </p>
      <a href="/" class="inline-block px-6 py-3 mt-8 font-medium text-white rounded-md bg-rose-500 hover:bg-rose-600">
        Back to home
      </a>
    </div>
  </div>
</body>
</html>
