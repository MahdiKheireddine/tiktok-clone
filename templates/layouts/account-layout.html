{% extends 'base.html' %}
{% load static %}

{% block layout %}
  

<div {% block attrs %} id="account" {% endblock %} class="bg-white text-black min-h-[100dvh] grid grid-rows-[auto_1fr_auto]">

    <header class="sticky top-0 z-10">
      <div class="flex h-[60px] items-center bg-white px-2.5">
        <a href="{% url 'index' %}">
          <img src="{% static 'images/tiktok.png' %}" alt="TikTok" />
        </a>
      </div>
    </header>


    <main class="w-[500px] mx-auto py-16 px-6">
    {% block content %}
      
    {% endblock %}
    </main>

    <footer>
        
        {% block terms %}
            
        {% endblock terms %}

        {% block has_account %}
            
        {% endblock has_account %}

        <div class="flex items-center justify-end h-20 text-sm bg-black px-36 text-neutral-400">
          <p>© 2026 TikTok</p>
        </div>
      </footer>
</div>

{% endblock %}
