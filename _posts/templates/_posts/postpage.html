{% extends 'layouts/blank-layout.html' %}
{% load static %}

{% block meta_tags %}
  <meta property="og:title" content="Post by {{ post.author.username }}">
  <meta property="og:description" content="Check out this post!">
  <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{{ post.image.url }}">
  <meta property="og:type" content="article">
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Post by {{ post.author.username }}">
  <meta property="twitter:description" content="Check out this post!">
  <meta property="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{{ post.image.url }}">
{% endblock %}

{% block content %}
<a href="/" class="absolute flex items-center justify-center transition duration-300 rounded-full z-100 top-5 left-5 size-10 hover:bg-rose-500">
    <img src="{% static 'images/icon_dark.png' %}" alt="">
</a>
{% include '_posts/partials/_postpage.html' %}

{% endblock %}
