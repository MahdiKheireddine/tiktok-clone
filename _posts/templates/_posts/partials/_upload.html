{% load static %}

<div class="px-4 xl:px-12 ml-18 lg:ml-60">
    <div class="max-w-[1250px] mx-auto">
        <form method="post" enctype="multipart/form-data" class="py-20"
            x-data="uploadComponent()"
            @dragenter="isDragging = true"
            @dragleave="isDragging = false"
            @dragover.prevent
            @drop="fileDropped($event)"
            >
            {% csrf_token %}
            <upload-box x-show="!imageUrl" :class="isDragging ? 'border-blue-400 dark:border-blue-500/50 bg-blue-50 dark:bg-blue-950/40' : 'border-neutral-400 dark:border-neutral-600 bg-neutral-100 dark:bg-neutral-900'" class="block py-32 border border-dashed rounded-xl">
                    <div class="flex flex-col items-center gap-1 mx-auto text-center pointer-events-none w-max">
                    <div class="size-12">
                        <svg class="scale-75" viewBox="0 0 48 48">
                            <path d="M25 15a1 1 0 0 1 1 1v6h6a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-6v6a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-6h-6a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1h6v-6a1 1 0 0 1 1-1h2Z"></path>
                            <path d="M33.58 4.5H14.42c-1.33 0-2.45 0-3.37.07-.95.08-1.86.25-2.73.7a7 7 0 0 0-3.06 3.05 7.14 7.14 0 0 0-.69 2.73 44.6 44.6 0 0 0-.07 3.37v19.16c0 1.33 0 2.45.07 3.37.08.95.25 1.86.7 2.73a7 7 0 0 0 3.05 3.06c.87.44 1.78.6 2.73.69.92.07 2.04.07 3.37.07h19.16c1.33 0 2.45 0 3.37-.07a7.14 7.14 0 0 0 2.73-.7 7 7 0 0 0 3.06-3.05c.44-.87.6-1.78.69-2.73.07-.92.07-2.04.07-3.37V14.42c0-1.33 0-2.45-.07-3.37a7.14 7.14 0 0 0-.7-2.73 7 7 0 0 0-3.05-3.06 7.14 7.14 0 0 0-2.73-.69 44.6 44.6 0 0 0-3.37-.07ZM10.14 8.83c.2-.1.53-.21 1.24-.27.73-.06 1.69-.06 3.12-.06h19c1.43 0 2.39 0 3.12.06a3.3 3.3 0 0 1 1.24.27 3 3 0 0 1 1.31 1.3c.1.21.21.54.27 1.25.06.73.06 1.69.06 3.12v19c0 1.43 0 2.39-.06 3.12a3.3 3.3 0 0 1-.27 1.24 3 3 0 0 1-1.3 1.31c-.21.1-.54.21-1.25.27-.73.06-1.69.06-3.12.06h-19c-1.43 0-2.39 0-3.12-.06a3.3 3.3 0 0 1-1.24-.27 3 3 0 0 1-1.31-1.3c-.1-.21-.21-.54-.27-1.25-.06-.73-.06-1.69-.06-3.12v-19c0-1.43 0-2.39.06-3.12a3.3 3.3 0 0 1 .27-1.24 3 3 0 0 1 1.3-1.31Z"></path>
                        </svg>
                    </div>
                    <h1>Select image to upload</h1>
                    <div class="mb-3 text-neutral-500"> Or drag and drop it here</div>
                    <button type="button" @click="$refs.inputFileSelected.click()" :class="{ 'opacity-0 pointer-events-none' : isDragging}" class="py-2 font-medium text-white rounded-md pointer-events-auto bg-rose-500 hover:bg-rose-600 px-7">
                        Select Image
                    </button>
                    <input name="image" required type="file" class="hidden" accept="image/*" x-ref="inputFileSelected" @change="fileSelected($event)" />
                    </div>
            </upload-box>
            <create-post-box x-show="imageUrl" class="block" x-transition:enter.opacity.duration.300ms x-cloak>
                <div action="" class="grid grid-cols-1 lg:grid-cols-2 gap-4 max-w-[400px] lg:max-w-none mx-auto">
                    <div class="flex items-center order-2 lg:order-1">
                        <div class="flex flex-col w-full gap-4">
                        <div>
                            <div class="font-bold text-neutral-600">Caption</div>
                            <textarea x-model="caption" name="body" type="text" maxlength="80" placeholder="Add a cation here..." class="w-full px-4 py-3 rounded-lg outline-none resize-none min-h-36 bg-neutral-100 dark:bg-neutral-900"></textarea>
                        </div>
                        <div>
                            <div class="font-bold text-neutral-600">Hashtags</div>
                            <input x-model="hashtag" name="tags" type="text" maxlength="80" placeholder="#tags - separated by a space" class="w-full px-4 py-3 rounded-lg outline-none bg-neutral-100 dark:bg-neutral-900">
                        </div>
                        <div class="flex gap-3">
                            <button type="submit" class="py-2 font-medium text-white rounded-md bg-rose-500 hover:bg-rose-600 px-7">
                            Submit Post
                            </button>
                            <button @click="discardUpload" type="button" class="px-4 py-2 font-medium rounded-md bg-neutral-200 dark:bg-neutral-800 hover:bg-neutral-300 dark:hover:bg-neutral-800/80 text-neutral-500">
                            Discard
                            </button>
                        </div>
                        </div>
                    </div>
                    <div class="flex items-center justify-center lg:h-[500px] order-1 lg:order-2 max-h-[500px]">
                        <img :src="imageUrl" alt="" class="max-w-full max-h-full">
                    </div>
                </div>
                
            </create-post-box>
        </form>
    </div>
</div>

<script>
    function uploadComponent(){
      return {
        isDragging : false,
        imageUrl: null,
        caption: null,
        hashtag: null,

        fileDropped(event){
          event.preventDefault();
          this.isDragging = false;

          const file = event.dataTransfer.files[0];
          if (file && file.type.startsWith('image/')) {
            this.imageUrl = URL.createObjectURL(file);

            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            this.$refs.inputFileSelected. files = dataTransfer.files;
          }
        },

        fileSelected(event){
          const file = event.target.files[0];
          if (file && file.type.startsWith('image/')) {
            this.imageUrl = URL.createObjectURL(file);
          }
        },

        discardUpload(){
          this.imageUrl = null;
          this.caption = '',
          this.hashtag = ''
        }
      }
    }
</script>


{% if request.htmx %}
    <title hx-swap-oob="true">Upload - Tiktok</title>

    <div hx-swap-oob="innerHTML" id="navigation">
        {% include 'includes/navigation.html' %}
    </div>
{% endif %}
