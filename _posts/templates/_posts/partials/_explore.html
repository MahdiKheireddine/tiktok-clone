{% load static %}

<div id="explore_page" class="px-12 ml-18 lg:ml-60" x-data="{ selectedTag: '{{ selected_tag|default:'' }}' }">
    <div class="py-9">
        <ul class="flex gap-3">
                    <li>
                        <a  hx-get="{% url 'explore' %}"
                            hx-target="#explore_page"
                            hx-swap="outerHTML"
                            hx-push-url="true"
                            class="p-3 font-medium rounded-lg cursor-pointer"
                            :class="!selectedTag ? 'text-white bg-black  dark:bg-white dark:text-black' : 'bg-neutral-100 dark:bg-neutral-900'">
                            All
                        </a>
                    </li>

                    
                    {% for tag in tags %}
                        <li>
                            <a  hx-get="{% url 'explore' %}?tag={{ tag.name }}"
                                hx-target="#explore_page"
                                hx-swap="outerHTML"
                                hx-push-url="true"
                                class="p-3 font-medium rounded-lg cursor-pointer"
                                :class="selectedTag === '{{ tag.name }}' ? 'text-white bg-black  dark:bg-white dark:text-black' : 'bg-neutral-100 dark:bg-neutral-900'">
                                {{ tag.name }}
                            </a>
                        </li>
                    {% endfor %}
        </ul>
    </div>
    <div class="grid gap-x-4 gap-y-6 grid-cols-2 lg:grid-cols-[repeat(auto-fill,_minmax(208px,_1fr))] pb-6">
        
        {% for post in posts %}
            {% include '_posts/partials/_post_card.html' %}
        {% endfor %}
    </div>
</div>


{% if request.htmx %}
    <title hx-swap-oob="true">Explore - Tiktok</title>

    <div hx-swap-oob="innerHTML" id="navigation">
        {% include 'includes/navigation.html' %}
    </div>
{% endif %}
