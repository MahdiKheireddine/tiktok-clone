{% if tag_suggestions %}
    <ul class="mt-4">
        {% for tag in tag_suggestions %}
            <li>
                <a href="{% url 'search' %}?q={{ tag.name }}" class="flex items-center gap-3 px-5 py-2 font-medium hover:bg-neutral-100 dark:hover:bg-neutral-900">
                    <div class="size-4">
                        <svg viewBox="0 0 48 48">
                            <path d="M21.83 7.5a14.34 14.34 0 1 1 0 28.68 14.34 14.34 0 0 1 0-28.68Zm0-4a18.33 18.33 0 1 0 11.48 32.64l8.9 8.9a1 1 0 0 0 1.42 0l1.4-1.41a1 1 0 0 0 0-1.42l-8.89-8.9A18.34 18.34 0 0 0 21.83 3.5Z"></path>
                        </svg>
                    </div>
                    <div>{{ tag }}</div>
                </a>
            </li>
        {% endfor %} 
    </ul>
{% endif %}

{% if user_suggestions %}
    <p class="mt-6 ml-2 text-sm font-medium text-neutral-400">
        Accounts
    </p>
    <ul>
        
        {% for this_user in user_suggestions %}
            <li>
                <a href="{% url 'profile' this_user.username %}" class="flex items-center gap-2 px-3 py-2 hover:bg-neutral-100 dark:hover:bg-neutral-900 ">
                    <div class="overflow-hidden rounded-full size-9">
                        <img src="{{ this_user.avatar }}" class="object-cover w-full h-full">
                    </div>
                    <div>
                        <p class="font-medium">
                            {{ this_user.username }}
                        </p>
                        <p class="text-sm">
                            {{ this_user.name}}
                        </p>
                    </div>
                </a>
            </li>
        {% endfor %}
            
    </ul>
{% endif %}
